<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini HMS{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">Mini HMS</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span style="color: var(--text-muted); margin-right: 1rem;">Hello, {{ user.username }} ({{ user.role }})</span>
                <a href="/">Dashboard</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>
    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="card" style="padding: 1rem; border-left: 4px solid var(--primary); margin-bottom: 1rem;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
